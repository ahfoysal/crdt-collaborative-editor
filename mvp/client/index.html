<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRDT MVP — RGA Collaborative Editor</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, sans-serif; }
      body { margin: 0; padding: 24px; max-width: 800px; margin-inline: auto; }
      h1 { font-size: 18px; margin: 0 0 8px; }
      .meta { font-size: 12px; color: #888; margin-bottom: 12px; }
      textarea {
        width: 100%;
        height: 60vh;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
        line-height: 1.5;
        padding: 12px;
        box-sizing: border-box;
        border: 1px solid #888;
        border-radius: 6px;
      }
      .status { font-size: 12px; margin-top: 8px; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
      .dot.ok { background: #22c55e; }
      .dot.bad { background: #ef4444; }
    </style>
  </head>
  <body>
    <h1>CRDT MVP — RGA Collaborative Editor</h1>
    <div class="meta">
      client: <code id="clientId"></code> · open another tab to collaborate
    </div>
    <textarea id="editor" spellcheck="false" autofocus></textarea>
    <div class="status"><span id="statusDot" class="dot bad"></span><span id="statusText">connecting…</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
